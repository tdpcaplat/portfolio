<style>
  :root{
    --bg:#0424E3;
    --bg-alt:#031C9E;
    --ink:#FFFFFF;
    --ink-muted: rgba(255,255,255,0.68);
    --accent:#FF5F10;
    --accent-2:#FF8A47;
    --accent-text:var(--ink);
    --accent-ink:#0B0B12;
    --line: rgba(255,95,16,0.25);
  }
  body.lang-en{
    --bg:#37007A;
    --bg-alt:#2B0060;
    --ink:#FFFFFF;
    --ink-muted: rgba(255,255,255,0.68);
    --accent:#1CF121;
    --accent-2:#6AFF6E;
    --accent-text:var(--accent);
    --line: rgba(28,241,33,0.25);
  }
  *{margin:0;padding:0;box-sizing:border-box;transition:background-color .45s ease, color .45s ease, border-color .45s ease;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--ink);font-family:'Work Sans', sans-serif;font-weight:300;line-height:1.6;}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:1100px;margin:0 auto;padding:0 32px;}
  body.lang-fr .en{display:none;}
  body.lang-en .fr{display:none;}

  .groove{
    position:fixed;right:-120px;top:12%;
    width:520px;height:520px;
    pointer-events:none;opacity:0.35;
    color:var(--ink);
    z-index:-1;
    transition:top .05s linear;
  }
  .groove svg{width:100%;height:100%;}
  .groove .ring{transition:color .35s ease;}
  .groove .accent-dot{color:var(--accent);}

  header{padding:26px 0;border-bottom:1px solid var(--line);}
  header .wrap{display:flex;justify-content:space-between;align-items:center;}
  .logo{font-family:'IBM Plex Mono', monospace;font-size:14px;letter-spacing:0.05em;color:var(--accent-text);}
  .logo span{color:var(--ink);}
  .back{
    font-family:'IBM Plex Mono', monospace;font-size:12px;text-transform:uppercase;letter-spacing:0.08em;
    color:var(--ink-muted);display:flex;align-items:center;gap:8px;transition:color .2s;
  }
  .back:hover{color:var(--ink);}
  .lang-switch{
    font-family:'IBM Plex Mono', monospace;font-size:12px;letter-spacing:0.06em;
    display:flex;border:1px solid var(--line);border-radius:20px;overflow:hidden;
  }
  .lang-switch button{background:none;border:none;color:var(--ink-muted);padding:6px 14px;cursor:pointer;font-family:inherit;font-size:inherit;transition:color .2s, background .2s;}
  .lang-switch button.active{background:var(--accent);color:var(--accent-ink);}
  .header-inner{display:flex;align-items:center;gap:32px;}

  .brand-hero{padding:100px 0 70px;border-bottom:1px solid var(--line);}
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;
    color:var(--ink);margin-bottom:20px;display:flex;align-items:center;gap:10px;
  }
  .eyebrow::before{content:'';width:26px;height:1px;background:var(--accent);}
  h1{font-family:'Fraunces', serif;font-weight:500;font-size:clamp(38px, 6vw, 72px);line-height:1.05;max-width:820px;color:var(--accent);}
  .brand-meta{
    display:flex;gap:48px;flex-wrap:wrap;margin-top:36px;
    font-family:'IBM Plex Mono', monospace;font-size:12px;color:var(--ink);
  }
  .brand-meta strong{display:block;color:var(--accent-text);font-size:14px;margin-bottom:4px;font-family:'Work Sans',sans-serif;font-weight:500;}
  .brand-desc{max-width:640px;margin-top:28px;color:var(--ink-muted);font-size:17px;}

  section{padding:80px 0;}
  .section-label{
    font-family:'IBM Plex Mono', monospace;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;
    color:var(--ink);display:flex;align-items:baseline;gap:14px;margin-bottom:40px;
  }
  .section-label .rule{flex:1;height:1px;background:var(--line);}

  .gallery{
    display:flex;gap:18px;overflow-x:auto;scroll-snap-type:x mandatory;
    padding-bottom:14px;-webkit-overflow-scrolling:touch;
    align-items:center;
  }
  .gallery-row{margin-bottom:32px;}
  .gallery-row-title{
    font-family:'IBM Plex Mono', monospace;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--accent-text);margin-bottom:14px;
  }
  .gallery-item{
    height:280px;border-radius:4px;overflow:hidden;position:relative;
    background:var(--bg-alt);border:1px solid var(--line);
    flex:0 0 auto;scroll-snap-align:start;
  }
  .gallery::-webkit-scrollbar{height:6px;}
  .gallery::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px;}
  .gallery::-webkit-scrollbar-track{background:var(--line);}
  .gallery-item img, .gallery-item video{height:100%;width:auto;max-width:none;object-fit:contain;display:block;transition:transform .5s ease;}
  .gallery-item.clickable{cursor:zoom-in;}
  .gallery-item.clickable:hover img, .gallery-item.clickable:hover video{transform:scale(1.06);}
  .placeholder{
    width:210px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;color:var(--ink-muted);text-align:center;padding:20px;
    border:1px dashed var(--line);box-sizing:border-box;
  }
  .placeholder .plus{font-family:'Fraunces', serif;font-size:32px;color:var(--accent);}
  .placeholder small{font-family:'IBM Plex Mono', monospace;font-size:10px;letter-spacing:0.04em;max-width:200px;}

  .lightbox{
    position:fixed;inset:0;z-index:200;
    background:rgba(0,0,0,0.75);
    display:flex;align-items:center;justify-content:center;
    padding:40px;
    opacity:0;pointer-events:none;
    transition:opacity .3s ease;
  }
  .lightbox.open{opacity:1;pointer-events:auto;}
  .lightbox-box{
    position:relative;
    background:rgba(20,20,24,0.9);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:8px;
    padding:4px;
    max-width:85vw;max-height:80vh;
    width:fit-content;height:fit-content;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .lightbox-stage{
    display:flex;align-items:center;gap:14px;
  }
  .lightbox-box img, .lightbox-box video{
    display:block;
    max-width:calc(85vw - 8px);max-height:calc(80vh - 8px);
    width:auto;height:auto;
    border-radius:4px;
  }
  .lightbox-close{
    position:absolute;top:-14px;right:-14px;
    background:#141418;border:1px solid rgba(255,255,255,0.15);
    border-radius:50%;width:32px;height:32px;padding:0;
    color:#FFFFFF;font-size:14px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    opacity:0.9;transition:opacity .2s ease;
  }
  .lightbox-close span{display:none;}
  .lightbox-close:hover{opacity:1;}
  .lightbox-arrow{
    position:relative;flex:0 0 auto;
    background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);
    color:#FFFFFF;width:40px;height:40px;border-radius:50%;
    font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .2s ease, opacity .2s ease;
  }
  .lightbox-arrow:hover{background:rgba(255,255,255,0.25);}
  .lightbox-arrow:disabled{opacity:0.2;cursor:default;}
  .lightbox-arrow:disabled:hover{background:rgba(255,255,255,0.1);}

  .brand-switch{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px;}
  .brand-switch a{
    font-family:'IBM Plex Mono', monospace;font-size:12px;color:var(--ink-muted);
    border:1px solid var(--line);border-radius:16px;padding:7px 14px;transition:color .2s, border-color .2s;
  }
  .brand-switch a.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}
  .brand-switch a:hover{color:var(--ink);}

  footer{padding:32px 0;font-family:'IBM Plex Mono', monospace;font-size:11px;color:var(--ink-muted);
    display:flex;justify-content:space-between;border-top:1px solid var(--line);}

  @media (max-width:760px){
    .header-inner{gap:16px;}
    .groove{display:none;}
    .gallery{

      scroll-snap-type:y proximity;
      max-height:none;
    }
    .gallery-item{

      scroll-snap-align:start;
    }
    .gallery-item img, .gallery-item video{
      width:100%;height:auto;max-height:70vh;
    }
    .placeholder{width:100%;height:220px;}
  }
</style>
</head>

<script>
(function(){
  const groove = document.querySelector('.groove');
  const rings = document.querySelectorAll('.groove .ring');
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  if (groove && rings.length && !prefersReducedMotion) {
    let ticking = false;
    const updateOnScroll = () => {
      const y = window.scrollY;
      const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      const progress = maxScroll > 0 ? Math.min(Math.max(y / maxScroll, 0), 1) : 0;

      const topPercent = 10 + progress * 75;
      groove.style.top = `${topPercent}%`;

      const activeRing = Math.round(progress * (rings.length - 1));
      rings.forEach(ring => {
        const isActive = Number(ring.dataset.ring) === activeRing;
        ring.style.color = isActive ? 'var(--accent)' : 'var(--ink)';
      });

      ticking = false;
    };
    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(updateOnScroll);
        ticking = true;
      }
    }, { passive: true });
    updateOnScroll();
  }
})();

const BRAND_ORDER = ["loreal", "optic2000", "pfizer", "unilever", "orange", "areva", "presse", "malakoff"];

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

const lightbox = document.getElementById('lightbox');
const lightboxContent = document.getElementById('lightboxContent');
const lightboxClose = document.getElementById('lightboxClose');
const lightboxPrev = document.getElementById('lightboxPrev');
const lightboxNext = document.getElementById('lightboxNext');

let currentMediaList = [];
let currentMediaIndex = 0;

function showLightboxItem(index) {
  const item = currentMediaList[index];
  if (!item) return;
  currentMediaIndex = index;
  lightboxContent.innerHTML = item.type === 'video'
    ? `<video src="${item.src}" controls autoplay></video>`
    : `<img src="${item.src}" alt="">`;
  lightboxPrev.disabled = index === 0;
  lightboxNext.disabled = index === currentMediaList.length - 1;
}

function openLightbox(mediaList, startIndex) {
  currentMediaList = mediaList;
  showLightboxItem(startIndex);
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('open');
  lightboxContent.innerHTML = '';
  document.body.style.overflow = '';
}

function bindLightbox() {
  const items = Array.from(document.querySelectorAll('.gallery-item.clickable'));
  const mediaList = items.map(el => ({ src: el.dataset.src, type: el.dataset.type }));
  items.forEach((el, index) => {
    el.addEventListener('click', () => openLightbox(mediaList, index));
  });
}

lightboxPrev.addEventListener('click', () => showLightboxItem(currentMediaIndex - 1));
lightboxNext.addEventListener('click', () => showLightboxItem(currentMediaIndex + 1));
lightboxClose.addEventListener('click', closeLightbox);
lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) closeLightbox();
});
document.addEventListener('keydown', (e) => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') showLightboxItem(currentMediaIndex - 1);
  if (e.key === 'ArrowRight') showLightboxItem(currentMediaIndex + 1);
});

function currentLang() {
  return document.body.classList.contains('lang-en') ? 'en' : 'fr';
}

function render() {
  const key = getParam("marque") || getParam("brand") || "loreal";
  const brand = BRANDS[key] || BRANDS.loreal;
  const lang = currentLang();

  document.getElementById("brand-eyebrow").innerHTML =
    `<span class="fr">${brand.eyebrow.fr}</span><span class="en">${brand.eyebrow.en}</span>`;
  document.getElementById("brand-title").innerHTML =
    `<span class="fr">${brand.title.fr}</span><span class="en">${brand.title.en}</span>`;
  document.getElementById("brand-desc").innerHTML =
    `<span class="fr">${brand.desc.fr}</span><span class="en">${brand.desc.en}</span>`;

  document.getElementById("brand-meta").innerHTML = brand.meta.map(m => `
    <div><strong>${m.value.fr === m.value.en ? m.value.fr : `<span class="fr">${m.value.fr}</span><span class="en">${m.value.en}</span>`}</strong>
    <span class="fr">${m.fr}</span><span class="en">${m.en}</span></div>
  `).join("");

  function renderGalleryItems(media) {
    return media.map(item => {
      if (!item.src) {
        return `<div class="gallery-item"><div class="placeholder">
          <div class="plus">+</div>
          <small><span class="fr">${item.caption.fr} — ajoute ton fichier dans BRANDS</span><span class="en">${item.caption.en} — add your file in BRANDS</span></small>
        </div></div>`;
      }
      if (item.type === "video") {
        return `<div class="gallery-item clickable" data-src="${item.src}" data-type="video"><video src="${item.src}" controls></video></div>`;
      }
      return `<div class="gallery-item clickable" data-src="${item.src}" data-type="image"><img src="${item.src}" alt="${item.caption.fr}"></div>`;
    }).join("");
  }

  const wrapper = document.getElementById("galleryWrapper");
  if (brand.mediaGroups) {
    wrapper.innerHTML = brand.mediaGroups.map(group => `
      <div class="gallery-row">
        <div class="gallery-row-title"><span class="fr">${group.label.fr}</span><span class="en">${group.label.en}</span></div>
        <div class="gallery">${renderGalleryItems(group.media)}</div>
      </div>
    `).join("");
  } else {
    wrapper.innerHTML = `<div class="gallery">${renderGalleryItems(brand.media)}</div>`;
  }

  bindLightbox();

  document.getElementById("brand-switch").innerHTML = BRAND_ORDER.map(k => {
    const b = BRANDS[k];
    const active = k === key ? "active" : "";
    return `<a class="${active}" href="?marque=${k}&lang=${lang}">
      <span class="fr">${b.title.fr}</span><span class="en">${b.title.en}</span>
    </a>`;
  }).join("");

  const backLink = document.querySelector('.back');
  if (backLink) backLink.setAttribute('href', `index.html?lang=${lang}`);
}

// Applique la langue présente dans l'URL (sinon FR par défaut) avant le premier rendu
const initialLang = getParam("lang") === "en" ? "en" : "fr";
document.body.classList.remove('lang-fr', 'lang-en');
document.body.classList.add('lang-' + initialLang);
document.documentElement.setAttribute('lang', initialLang);

render();

const buttons = document.querySelectorAll('.lang-switch button');
buttons.forEach(btn => {
  btn.classList.toggle('active', btn.dataset.lang === initialLang);
  btn.addEventListener('click', () => {
    const lang = btn.dataset.lang;
    document.body.classList.remove('lang-fr', 'lang-en');
    document.body.classList.add('lang-' + lang);
    document.documentElement.setAttribute('lang', lang);
    buttons.forEach(b => b.classList.toggle('active', b === btn));

    const url = new URL(window.location);
    url.searchParams.set('lang', lang);
    window.history.replaceState({}, '', url);

    render();
  });
});
